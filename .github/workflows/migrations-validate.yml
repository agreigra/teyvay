name: Validate migrations

# Runs on every PR that touches the database. Proves the migrations apply
# cleanly to a *fresh* Postgres and pass lint — without touching any hosted
# Supabase project. This is the gate before code is allowed into develop.

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/migrations-validate.yml"

# Cancel superseded runs on the same PR to save minutes.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Apply migrations to throwaway Postgres
    runs-on: ubuntu-latest

    # Ephemeral database — must match the hosted projects' major version.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # psql honors sslmode=disable; the throwaway service container has no TLS.
      DB_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show pending migrations
        run: ls -1 supabase/migrations

      - name: Apply migrations to a fresh database
        # Apply every migration in filename order with psql. ON_ERROR_STOP makes
        # any failed statement (bad SQL, wrong order, missing dependency) fail
        # the job. We use psql rather than `supabase migration up --db-url`
        # because that CLI path forces TLS and the service container has none.
        # The real deploys still use the Supabase CLI over TLS.
        run: |
          shopt -s nullglob
          for f in supabase/migrations/*.sql; do
            echo "── Applying $f"
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "All migrations applied cleanly."
