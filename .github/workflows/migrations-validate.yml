name: Validate migrations

# Runs on every PR that touches the database. Proves the migrations apply
# cleanly, from scratch, to a faithful local Supabase database (with the auth /
# storage schemas) — without touching any hosted project. This is the gate
# before code is allowed into develop.

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/migrations-validate.yml"

# Cancel superseded runs on the same PR to save minutes.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Apply migrations to a fresh local Supabase DB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show pending migrations
        run: ls -1 supabase/migrations

      - name: Start local Supabase Postgres
        # The CLI's Postgres image ships the auth/storage schemas and roles that
        # the migrations depend on (auth.users, auth.uid(), ...) — a plain
        # postgres container does not, which is why we use the CLI's own DB.
        run: supabase db start

      - name: Apply all migrations from scratch
        # `db reset` re-applies every migration in order against the local DB and
        # exits non-zero if any migration fails (bad SQL, wrong order, missing
        # dependency). --no-seed because this is migration validation, not data.
        run: supabase db reset --no-seed
