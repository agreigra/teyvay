name: Deploy to Production

# Reaches main automatically, but does NOT deploy automatically. The deploy job
# is bound to the `production` GitHub Environment, which has a required-reviewer
# protection rule — the run pauses until a human approves it. Only then are
# migrations applied to the Production Supabase project.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-production.yml"
  # Allow a manual re-run from the Actions tab (e.g. after fixing a failed push).
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Re-validate on fresh Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations to a fresh database
        run: supabase migration up --db-url "postgresql://postgres:postgres@localhost:5432/postgres"

  deploy:
    name: Push migrations to Production project
    needs: validate
    runs-on: ubuntu-latest
    # The manual approval gate. Configure required reviewers on this Environment
    # (Settings → Environments → production). The job will not start until a
    # designated reviewer clicks "Approve".
    environment:
      name: production
      url: https://supabase.com/dashboard/project/${{ secrets.SUPABASE_PROJECT_ID }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show what will be applied
        run: supabase db push --dry-run

      - name: Apply pending migrations
        run: supabase db push
