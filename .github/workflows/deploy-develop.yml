name: Deploy to Development

# Fires automatically when a PR is merged into develop. Re-validates the
# migrations on a fresh DB, then pushes pending migrations to the hosted
# Development Supabase project. Any failure fails the run (and the deploy).

on:
  push:
    branches: [develop]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-develop.yml"

# Never run two deploys to the same project at the same time. Do NOT cancel in progress
# — a half-applied migration push must be allowed to finish.
concurrency:
  group: deploy-development
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Re-validate on a fresh local Supabase DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase Postgres
        # CLI's image has the auth/storage schemas the migrations depend on.
        run: supabase db start
      - name: Apply all migrations from scratch
        # Re-applies every migration in order; non-zero exit if any fails.
        run: supabase db reset --no-seed

  deploy:
    name: Push migrations to Development project
    needs: validate
    runs-on: ubuntu-latest
    # Bind to the GitHub Environment so its secrets/protection rules apply.
    environment: development
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Development project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show what will be applied
        run: supabase db push --dry-run

      - name: Apply pending migrations
        # Exits non-zero if any migration fails — the job (and deploy) fails.
        run: supabase db push
