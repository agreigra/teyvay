name: Deploy to Development

# Fires automatically when a PR is merged into develop. Re-validates the
# migrations on a fresh DB, then pushes pending migrations to the hosted
# Development Supabase project. Any failure fails the run (and the deploy).

on:
  push:
    branches: [develop]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-develop.yml"

# Never run two deploys to the same project at the same time. Do NOT cancel in progress
# — a half-applied migration push must be allowed to finish.
concurrency:
  group: deploy-development
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Re-validate on fresh Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations to a fresh database
        # psql (not the Supabase CLI): `supabase migration up --db-url` forces
        # TLS, which the throwaway service container can't speak. psql honors
        # sslmode=disable and fails on the first bad statement.
        env:
          DB_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
        run: |
          shopt -s nullglob
          for f in supabase/migrations/*.sql; do
            echo "── Applying $f"
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "All migrations applied cleanly."

  deploy:
    name: Push migrations to Development project
    needs: validate
    runs-on: ubuntu-latest
    # Bind to the GitHub Environment so its secrets/protection rules apply.
    environment: development
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Development project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show what will be applied
        run: supabase db push --dry-run

      - name: Apply pending migrations
        # Exits non-zero if any migration fails — the job (and deploy) fails.
        run: supabase db push
